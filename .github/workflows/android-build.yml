name: Android Build (HectorDriverDemo)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: HectorDriverDemo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print working directory and tree
        run: |
          echo "PWD = $PWD"
          echo "GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          ls -la
          ls -la gradle/wrapper || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK platforms and build-tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Bootstrap Gradle wrapper if broken/missing (verbose)
        run: |
          set -euxo pipefail
          PROJECT_DIR="$PWD"
          test -f "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.properties"
          raw_url=$(grep '^distributionUrl=' "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.properties" | cut -d'=' -f2- | tr -d '\r')
          dist_url=${raw_url//\\:/:}
          regen=0
          if [ ! -f "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.jar" ]; then regen=1; else
            if ! java -classpath "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain -v >/dev/null 2>&1; then regen=1; fi
          fi
          if [ "$regen" = "1" ]; then
            mkdir -p /tmp/gradle && cd /tmp/gradle
            curl -fL --retry 3 --retry-connrefused "$dist_url" -o gradle.zip
            unzip -q gradle.zip
            GDIR=$(find . -maxdepth 1 -type d -name "gradle-*")
            chmod +x "$GDIR/bin/gradle"
            "$GDIR/bin/gradle" -p "$PROJECT_DIR" wrapper --stacktrace --info
          fi
          ls -l "$PROJECT_DIR/gradle/wrapper" || true

      - name: Verify Gradle wrapper JAR
        run: |
          set -euxo pipefail
          file gradle/wrapper/gradle-wrapper.jar || true
          ls -l gradle/wrapper/gradle-wrapper.jar || true
          java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain -v || (echo "Wrapper JAR invalid"; exit 2)

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Java & Gradle versions
        run: |
          java -version
          ./gradlew -v

      - name: Build Debug APK (verbose)
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --info --warning-mode all --no-daemon --console=plain 2>&1 | tee build-logs.txt

      - name: Summarize failure (What went wrong / Caused by / first Kotlin 'e:' line)
        if: failure()
        run: |
          echo "================ What went wrong (context) ================"
          grep -n -A6 -B6 "What went wrong" build-logs.txt || true
          echo "================ Caused by (context) ======================"
          grep -n -A6 -B6 "Caused by:" build-logs.txt || true
          echo "================ First compiler error (Kotlin 'e:' line) ="
          grep -n "^e: " build-logs.txt | head -n 5 || true
          echo "================ LAST 200 LINES ==========================="
          tail -n 200 build-logs.txt || true

      - name: Upload full Gradle build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: HectorDriverDemo/build-logs.txt

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hector-driver-demo-apk
          path: HectorDriverDemo/app/build/outputs/apk/debug/*.apk
