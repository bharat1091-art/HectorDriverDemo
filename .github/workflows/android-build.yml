name: Android Build (HectorDriverDemo)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    defaults:
      run:
        working-directory: HectorDriverDemo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print working directory and tree
        run: |
          pwd
          ls -la
          ls -la gradle/wrapper || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK platforms and build-tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 🔧 NEW: Recreate the wrapper JAR exactly for the version in gradle-wrapper.properties
      - name: Bootstrap Gradle wrapper if broken/missing
        run: |
          set -e
          if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
            echo "Missing gradle/wrapper/gradle-wrapper.properties"; exit 1
          fi
          dist_url=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | cut -d'=' -f2-)
          echo "Using distribution: $dist_url"
          # If JAR missing or corrupted, (re)generate it
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing; generating…"
            need_wrapper=1
          else
            # quick sanity: try to run wrapper with current JAR; if fails, regenerate
            if ! java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain -v >/dev/null 2>&1; then
              echo "gradle-wrapper.jar seems incompatible; regenerating…"
              need_wrapper=1
            fi
          fi
          if [ "${need_wrapper:-0}" = "1" ]; then
            mkdir -p /tmp/gradle && cd /tmp/gradle
            curl -sL "$dist_url" -o gradle.zip
            unzip -q gradle.zip
            GDIR=$(find . -maxdepth 1 -type d -name "gradle-*")
            echo "Extracted to: $GDIR"
            # Run Gradle to generate wrapper files into the project dir (not the extracted dir)
            "$GDIR/bin/gradle" -p "$GITHUB_WORKSPACE/HectorDriverDemo" wrapper
            echo "Wrapper regenerated."
          else
            echo "gradle-wrapper.jar looks fine."
          fi

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Show Java/Gradle versions
        run: |
          java -version
          ./gradlew -v

      - name: Build Debug APK (verbose)
        run: ./gradlew assembleDebug --stacktrace --info --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hector-driver-demo-apk
          path: HectorDriverDemo/app/build/outputs/apk/debug/*.apk
